name: open_otaku
description: A premium anime streaming client with cinematic UI.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.5.1
  hooks_riverpod: ^2.5.1
  flutter_hooks: ^0.20.5

  # Navigation
  go_router: ^14.0.0

  # Typography
  google_fonts: ^6.2.1

  # Images
  cached_network_image: ^3.4.1

  # Video
  video_player: ^2.9.1

  # UI Components
  shimmer: ^3.0.0
  flutter_svg: ^2.0.10
  auto_size_text: ^3.0.0

  # Utilities
  intl: ^0.19.0
  wakelock_plus: ^1.2.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
