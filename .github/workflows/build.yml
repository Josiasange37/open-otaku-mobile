name: Build & Release

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  FLUTTER_VERSION: '3.24.0'

jobs:
  # ─── Analyze & Test ───────────────────────────────────────────
  analyze:
    name: Analyze & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze code
        run: flutter analyze --no-fatal-infos

      - name: Run tests
        run: flutter test --coverage

  # ─── Build Android APK ────────────────────────────────────────
  build-android:
    name: Build Android APK
    needs: analyze
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build fat APK (all ABIs)
        run: flutter build apk --release

      - name: Build split APKs (per ABI)
        run: flutter build apk --release --split-per-abi

      - name: Upload fat APK
        uses: actions/upload-artifact@v4
        with:
          name: open-otaku-apk-universal
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30

      - name: Upload split APKs
        uses: actions/upload-artifact@v4
        with:
          name: open-otaku-apk-split
          path: |
            build/app/outputs/flutter-apk/app-arm64-v8a-release.apk
            build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk
            build/app/outputs/flutter-apk/app-x86_64-release.apk
          retention-days: 30

  # ─── Build iOS (unsigned) ──────────────────────────────────────
  build-ios:
    name: Build iOS (unsigned)
    needs: analyze
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build iOS (no codesign)
        run: flutter build ios --release --no-codesign

      - name: Archive iOS build
        run: |
          cd build/ios/iphoneos
          mkdir -p Payload
          cp -r Runner.app Payload/
          zip -r ../../../open-otaku-ios-unsigned.ipa Payload/

      - name: Upload iOS IPA
        uses: actions/upload-artifact@v4
        with:
          name: open-otaku-ios-unsigned
          path: open-otaku-ios-unsigned.ipa
          retention-days: 30

  # ─── Create Release (on tag push) ─────────────────────────────
  release:
    name: Create GitHub Release
    needs: [build-android, build-ios]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download Android APK
        uses: actions/download-artifact@v4
        with:
          name: open-otaku-apk-universal
          path: release-assets/

      - name: Download iOS IPA
        uses: actions/download-artifact@v4
        with:
          name: open-otaku-ios-unsigned
          path: release-assets/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            release-assets/app-release.apk
            release-assets/open-otaku-ios-unsigned.ipa
          body: |
            ## Open Otaku ${{ github.ref_name }}

            ### Downloads
            - **Android**: `app-release.apk` (universal, all ABIs)
            - **iOS**: `open-otaku-ios-unsigned.ipa` (unsigned, requires re-signing)

            ### What's Changed
            See auto-generated release notes below.
